name: CI Pipeline

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:

  # ─────────────────────────────────────────────
  # SECURITY: Secret scanning
  # ─────────────────────────────────────────────
  secret-scanning:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

  # ─────────────────────────────────────────────
  # SECURITY: Dependency review (PR diffs)
  # ─────────────────────────────────────────────
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  # ─────────────────────────────────────────────
  # SECURITY: npm audit — Backend
  # ─────────────────────────────────────────────
  npm-audit:
    name: NPM audit (backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ClubHub-backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ClubHub-backend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts   # skip postinstall (puppeteer download)

      - name: Check vulnerable dependencies
        run: npm audit --audit-level=high

      - name: Generate audit report
        run: npm audit --json > npm-audit-backend.json || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-backend
          path: ClubHub-backend/npm-audit-backend.json

  # ─────────────────────────────────────────────
  # SECURITY: npm audit — Frontend (Expo/RN)
  # ─────────────────────────────────────────────
  frontend-npm-audit:
    name: NPM audit (frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ClubHub-frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ClubHub-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check vulnerable dependencies
        run: npm audit --audit-level=high

      - name: Generate audit report
        run: npm audit --json > npm-audit-frontend.json || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-frontend
          path: ClubHub-frontend/npm-audit-frontend.json

  # ─────────────────────────────────────────────
  # BUILD: Backend (TypeScript → dist/)
  # ─────────────────────────────────────────────
  build-backend:
    name: Build backend
    runs-on: ubuntu-latest
    needs: [ secret-scanning, dependency-review, npm-audit ]
    defaults:
      run:
        working-directory: ClubHub-backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ClubHub-backend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts   # skip puppeteer download na CI

      - name: Validate TypeScript configuration
        run: npx tsc --noEmit

      - name: Build TypeScript
        run: npm run build

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ClubHub-backend/
          format: spdx-json
          output-file: ClubHub-backend/sbom-backend.spdx.json

      - name: Upload build artefacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: |
            ClubHub-backend/dist/
            ClubHub-backend/sbom-backend.spdx.json

  # ─────────────────────────────────────────────
  # BUILD: Frontend — TypeScript check + Expo export
  # (não há `npm run build` numa app Expo/React Native)
  # ─────────────────────────────────────────────
  build-frontend:
    name: Build frontend (Expo)
    runs-on: ubuntu-latest
    needs: [ secret-scanning, dependency-review, frontend-npm-audit ]
    defaults:
      run:
        working-directory: ClubHub-frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ClubHub-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate TypeScript configuration
        run: npx tsc --noEmit

      # Expo web export valida bundling sem precisar de dispositivo físico
      - name: Expo web export (bundle validation)
        run: npx expo export --platform web
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ClubHub-frontend/
          format: spdx-json
          output-file: ClubHub-frontend/sbom-frontend.spdx.json

      - name: Upload frontend SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-sbom
          path: ClubHub-frontend/sbom-frontend.spdx.json

  # ─────────────────────────────────────────────
  # SAST: CodeQL (JS/TS — backend + frontend)
  # ─────────────────────────────────────────────
  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    needs: [ build-backend, build-frontend ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4

  # ─────────────────────────────────────────────
  # SAST: NodeJsScan (foca em vulns Node/Express)
  # ─────────────────────────────────────────────
  sast:
    name: SAST (NodeJsScan)
    runs-on: ubuntu-latest
    needs: [ build-backend ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run NodeJsScan
        uses: ajinabraham/njsscan-action@master
        with:
          args: '--sarif --output nodejsscan.sarif ClubHub-backend/src || true'

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: nodejsscan.sarif

      - name: Upload raw report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nodejsscan-report
          path: nodejsscan.sarif

  # ─────────────────────────────────────────────
  # DAST: OWASP ZAP baseline scan
  #
  # Usa PostgreSQL (Supabase-compatible) + Redis locais.
  # Firebase e Supabase Storage são mockados via env vars
  # — o servidor arranca mas essas features falham graciosamente.
  # ─────────────────────────────────────────────
  dast:
    name: OWASP ZAP baseline scan
    runs-on: ubuntu-latest
    needs: [ build-backend ]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: desofs
          POSTGRES_PASSWORD: desofs
          POSTGRES_DB: desofs_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U desofs"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ClubHub-backend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts
        working-directory: ClubHub-backend

      - name: Download build artefacts
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: ClubHub-backend/

      - name: Start backend server
        run: node dist/server.js &
        working-directory: ClubHub-backend
        env:
          NODE_ENV: test
          PORT: 3000
          # PostgreSQL local (CI)
          DATABASE_URL: postgresql://desofs:desofs@localhost:5432/desofs_test
          # Redis local (CI)
          REDIS_URL: redis://localhost:6379
          # JWT — valores longos de teste (>= 32 chars exigidos pelo server.ts)
          JWT_ACCESS_SECRET: ${{ secrets.CI_JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.CI_JWT_REFRESH_SECRET }}
          # Supabase — apontar para instância real ou deixar falhar graciosamente
          SUPABASE_URL: ${{ secrets.CI_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.CI_SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_BUCKET: uploads
          # Firebase — stub (notificações vão falhar mas o servidor arranca)
          FIREBASE_PROJECT_ID: ci-stub
          FIREBASE_CLIENT_EMAIL: ci@ci-stub.iam.gserviceaccount.com
          FIREBASE_PRIVATE_KEY: ${{ secrets.CI_FIREBASE_PRIVATE_KEY }}

      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3000/health 2>/dev/null || \
               curl -sf http://localhost:3000 2>/dev/null; then
              echo "Backend is ready"
              exit 0
            fi
            echo "Attempt $i/20 — waiting..."
            sleep 3
          done
          echo "Backend did not start in time — printing logs:"
          jobs -l
          exit 1

      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.14.0
        with:
          target: http://localhost:3000
          fail_action: true
          allow_issue_writing: false
          cmd_options: '-j'

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            report_html.html
            report_md.md
            report_json.json