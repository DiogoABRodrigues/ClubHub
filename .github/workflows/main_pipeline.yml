  #       run: npm ci --ignore-scripts
  #
  #     - name: Run unit tests with coverage
  #       run: npm run test:unit -- --coverage
  #       env:
  #         NODE_ENV: test
  #         JWT_ACCESS_SECRET: ${{ secrets.CI_JWT_ACCESS_SECRET }}
  #         JWT_REFRESH_SECRET: ${{ secrets.CI_JWT_REFRESH_SECRET }}
  #
  #     - name: Upload coverage report
  #       if: always()
  #       uses: actions/upload-artifact@v4
  #       with:
  #         name: coverage-report
  #         path: ClubHub-backend/coverage/

  # ─────────────────────────────────────────────
  # TESTES: Integration tests
  # Descomentar quando existirem testes de integração.
  # Adicionar ao package.json: "test:integration": "jest --testPathPattern=integration"
  # ─────────────────────────────────────────────
  # integration-tests:
  #   name: Integration tests
  #   runs-on: ubuntu-latest
  #   needs: [ unit-tests ]
  #   services:
  #     postgres:
  #       image: postgres:16
  #       env:
  #         POSTGRES_USER: clubhub
  #         POSTGRES_PASSWORD: clubhub
  #         POSTGRES_DB: clubhub_test
  #       ports:
  #         - 5432:5432
  #       options: >-
  #         --health-cmd="pg_isready -U clubhub"
  #         --health-interval=10s
  #         --health-timeout=5s
  #         --health-retries=10
  #     redis:
  #       image: redis:7
  #       ports:
  #         - 6379:6379
  #       options: >-
  #         --health-cmd="redis-cli ping"
  #         --health-interval=10s
  #         --health-timeout=5s
  #         --health-retries=10
  #   defaults:
  #     run:
  #       working-directory: ClubHub-backend
  #   steps:
  #     - name: Checkout repository
  #       uses: actions/checkout@v4
  #
  #     - name: Setup Node.js
  #       uses: actions/setup-node@v4
  #       with:
  #         node-version: 20
  #         cache: npm
  #         cache-dependency-path: ClubHub-backend/package-lock.json
  #
  #     - name: Install dependencies
  #       run: npm ci --ignore-scripts
  #
  #     - name: Run integration tests
  #       run: npm run test:integration
  #       env:
  #         NODE_ENV: test
  #         DATABASE_URL: postgresql://clubhub:clubhub@localhost:5432/clubhub_test
  #         REDIS_URL: redis://localhost:6379
  #         JWT_ACCESS_SECRET: ${{ secrets.CI_JWT_ACCESS_SECRET }}
  #         JWT_REFRESH_SECRET: ${{ secrets.CI_JWT_REFRESH_SECRET }}
  #         SUPABASE_URL: ${{ secrets.CI_SUPABASE_URL }}
  #         SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.CI_SUPABASE_SERVICE_ROLE_KEY }}
  #         SUPABASE_BUCKET: uploads

  # ─────────────────────────────────────────────
  # BUILD: Frontend — TypeScript check + Expo export
  # (não há `npm run build` numa app Expo/React Native)
  # ─────────────────────────────────────────────
  frontend-tests:
    name: Frontend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ClubHub-frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ClubHub-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit and integration tests with coverage
        run: npm run test:coverage

      - name: Upload frontend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: ClubHub-frontend/coverage/

  build-frontend:
    name: Build frontend (Expo)
    runs-on: ubuntu-latest
    needs: [ secret-scanning, frontend-npm-audit, frontend-tests ]
    defaults:
      run:
        working-directory: ClubHub-frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ClubHub-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Validate TypeScript configuration
        run: npx tsc --noEmit

      # Expo web export valida bundling sem precisar de dispositivo físico
      - name: Expo web export (bundle validation)
        run: npx expo export --platform web
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ClubHub-frontend/
          format: spdx-json
          output-file: ClubHub-frontend/sbom-frontend.spdx.json

      - name: Upload frontend SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-sbom
          path: ClubHub-frontend/sbom-frontend.spdx.json

  # ─────────────────────────────────────────────
  # SAST: CodeQL (JS/TS — backend + frontend)
  # ─────────────────────────────────────────────
  codeql:
    name: CodeQL analysis
    runs-on: ubuntu-latest
    needs: [ build-backend, build-frontend ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4

  # ─────────────────────────────────────────────
  # SAST: NodeJsScan (foca em vulns Node/Express)
  # ─────────────────────────────────────────────
  sast:
    name: SAST (NodeJsScan)
    runs-on: ubuntu-latest
    needs: [ build-backend ]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run NodeJsScan
        uses: ajinabraham/njsscan-action@master
        with:
          args: '--sarif --output nodejsscan.sarif ClubHub-backend/src || true'

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: nodejsscan.sarif

      - name: Upload raw report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nodejsscan-report
          path: nodejsscan.sarif

  # ─────────────────────────────────────────────
  # DAST: OWASP ZAP baseline scan
  #
  # Usa PostgreSQL (Supabase-compatible) + Redis locais.
  # Firebase e Supabase Storage são mockados via env vars
  # — o servidor arranca mas essas features falham graciosamente.
  # ─────────────────────────────────────────────
  dast:
    name: OWASP ZAP baseline scan
    runs-on: ubuntu-latest
    needs: [ build-backend ]
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: clubhub
          POSTGRES_PASSWORD: clubhub
          POSTGRES_DB: clubhub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U clubhub"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ClubHub-backend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts
        working-directory: ClubHub-backend

      - name: Download build artefacts
        uses: actions/download-artifact@v4
        with:
          name: backend-dist
          path: ClubHub-backend/


      - name: Create Firebase credentials file
        run: |
          echo '${{ secrets.CI_FIREBASE_CREDENTIALS_JSON }}' > firebase.json

      - name: Start backend server
        run: node dist/server.js > /tmp/backend.log 2>&1 &
        working-directory: ClubHub-backend
        env:
          FIREBASE_CREDENTIALS_PATH: ${{ github.workspace }}/firebase.json
          NODE_ENV: test
          PORT: 3000
          DATABASE_URL: postgresql://clubhub:clubhub@localhost:5432/clubhub_test
          REDIS_URL: redis://localhost:6379
          JWT_ACCESS_SECRET: ${{ secrets.CI_JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET: ${{ secrets.CI_JWT_REFRESH_SECRET }}
          SUPABASE_URL: ${{ secrets.CI_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.CI_SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_BUCKET: uploads

      - name: Verify Firebase file
        run: |
          pwd
          ls -la
          test -f firebase.json && echo "firebase.json exists"
          
      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 20); do
            if curl -sf http://localhost:3000/health 2>/dev/null || \
               curl -sf http://localhost:3000 2>/dev/null; then
              echo "Backend is ready"
              exit 0
            fi
            echo "Attempt $i/20 — waiting..."
            sleep 3
          done
          echo "Backend did not start in time — logs:"
          cat /tmp/backend.log
          exit 1

      - name: Run OWASP ZAP baseline scan
        uses: zaproxy/action-baseline@v0.15.0
        with:
          target: http://localhost:3000/health
          fail_action: true
          allow_issue_writing: false
          cmd_options: '-j -I'

      - name: Upload ZAP reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zap-report
          path: |
            report_html.html
            report_md.md
            report_json.json
