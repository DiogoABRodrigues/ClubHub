name: CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: read
  security-events: write

jobs:

  # ─────────────────────────────────────────────
  # SECURITY: Secret scanning
  # ─────────────────────────────────────────────
  secret-scanning:
    name: Secret scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ─────────────────────────────────────────────
  # SECURITY: Dependency review (PR diffs)
  # ─────────────────────────────────────────────
  dependency-review:
    name: Dependency review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Review dependency changes
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: high

  # ─────────────────────────────────────────────
  # SECURITY: npm audit — Backend
  # ─────────────────────────────────────────────
  npm-audit:
    name: NPM audit (backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ClubHub-backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ClubHub-backend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts   # skip postinstall (puppeteer download)

      - name: Check vulnerable dependencies
        run: npm audit --audit-level=high

      - name: Generate audit report
        run: npm audit --json > npm-audit-backend.json || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-backend
          path: ClubHub-backend/npm-audit-backend.json

  # ─────────────────────────────────────────────
  # SECURITY: npm audit — Frontend (Expo/RN)
  # ─────────────────────────────────────────────
  frontend-npm-audit:
    name: NPM audit (frontend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ClubHub-frontend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ClubHub-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check vulnerable dependencies
        run: npm audit --audit-level=high

      - name: Generate audit report
        run: npm audit --json > npm-audit-frontend.json || true

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-frontend
          path: ClubHub-frontend/npm-audit-frontend.json

  # ─────────────────────────────────────────────
  # BUILD: Backend (TypeScript → dist/)
  # ─────────────────────────────────────────────
  backend-tests:
    name: Backend tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ClubHub-backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ClubHub-backend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run unit and integration tests with coverage
        run: npm run test:coverage

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: ClubHub-backend/coverage/

  build-backend:
    name: Build backend
    runs-on: ubuntu-latest
    needs: [ secret-scanning, npm-audit, backend-tests ]
    defaults:
      run:
        working-directory: ClubHub-backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ClubHub-backend/package-lock.json

      - name: Install dependencies
        run: npm ci --ignore-scripts   # skip puppeteer download na CI

      - name: Validate TypeScript configuration
        run: npx tsc --noEmit

      - name: Build TypeScript
        run: npm run build

      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: ClubHub-backend/
          format: spdx-json
          output-file: ClubHub-backend/sbom-backend.spdx.json

      - name: Upload build artefacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-dist
          path: |
            ClubHub-backend/dist/
            ClubHub-backend/sbom-backend.spdx.json

  # ─────────────────────────────────────────────
  # TESTES: Unit tests
  # Descomentar quando existirem testes (Jest/Vitest).
  # Adicionar ao package.json: "test:unit": "jest --testPathPattern=unit"
  # ─────────────────────────────────────────────
