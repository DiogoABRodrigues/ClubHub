  #   name: Unit tests
  #   runs-on: ubuntu-latest
  #   needs: [ build-backend ]
  #   defaults:
  #     run:
  #       working-directory: ClubHub-backend
  #   steps:
  #     - name: Checkout repository
  #       uses: actions/checkout@v4
  #
  #     - name: Setup Node.js
  #       uses: actions/setup-node@v4
  #       with:
  #         node-version: 20
  #         cache: npm
  #         cache-dependency-path: ClubHub-backend/package-lock.json
  #
